apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana
  namespace: nok-bng
  labels:
    dashboards: "grafana"
spec:
  persistentVolumeClaim:
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 10Gi
      # storageClassName: "" # Customize storage class if needed
  config:
    log:
      mode: "console"  
    auth.anonymous:
      enabled: "true"
      org_role: "Admin"

    server:
      root_url: "http://bng.nok.local:8080/grafana"

  service:
    metadata:
      annotations:
        netopskube.io/bbm: "true"
        netopskube.io/prober: http  

  deployment:
    spec:
      template:
        spec:
          containers:
            - name: grafana
              readinessProbe:
                failureThreshold: 3
              env:
                - name: GF_INSTALL_PLUGINS
                  value: "andrewbmchugh-flow-panel"                  
          volumes:
            - name: grafana-data
              persistentVolumeClaim:
                claimName: grafana-pvc
      strategy:
        type: Recreate