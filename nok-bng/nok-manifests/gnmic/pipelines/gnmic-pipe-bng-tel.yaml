apiVersion: operator.gnmic.dev/v1alpha1
kind: Pipeline
metadata:
  namespace: nok-bng
  name: bng-tel
spec:
  clusterRef: bng-metrics
  enabled: true
  # Select targets by label
  targetSelectors:
    - matchLabels:
        vendor: Nokia
        role: bng
  subscriptionSelectors:
    - matchLabels:
        type: bng
  outputs:
    outputSelectors:
      - matchLabels:
          type: bng-ext-output  
    processorRefs:
      - oper-state-to-int              
