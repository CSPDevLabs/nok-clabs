apiVersion: operator.gnmic.dev/v1alpha1
kind: Pipeline
metadata:
  namespace: nok-bng
  name: bng-state
spec:
  clusterRef: bng-state
  enabled: true
  # Select targets by label
  targetSelectors:
    - matchLabels:
        vendor: Nokia
        role: bng
  # Select subscriptions by label
  subscriptionRefs:
    - sros-sub-mgmt-subscribers-on-change
    - sros-sub-mgmt-subscribers-sample
  # Select outputs by label
  outputs:
    outputSelectors:
      - matchLabels:
          type: bng-state  
    processorRefs:
      - oper-state-to-int  

            