apiVersion: operator.gnmic.dev/v1alpha1
kind: Output
metadata:
  namespace: nok-bng
  name: op-fluent
  labels:
    type: bng-state
spec:
  type: tcp
  config:
    address: "tel-fb:6000"
    format: json  
    rate: 10ms 
    keep-alive: 30s
    retry-interval: 30s
    enable-metrics: false 
    delimiter: "\n"    
