apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: main-alertmanager-config 
  namespace: nok-bng
  labels:
    alertmanagerConfig: main-alertmanager-config 
spec:
  route:
    groupBy: ['job']
    groupWait: 30s
    groupInterval: 5m
    repeatInterval: 12h
    receiver: 'webhook'
  receivers:
  - name: 'webhook'
    webhookConfigs:
    - url: 'http://alert-webhook-service'
---
apiVersion: monitoring.coreos.com/v1
kind: Alertmanager
metadata:
  name: alertmanager-main
  namespace: nok-bng
spec:
  replicas: 1
  alertmanagerConfiguration:
    name: main-alertmanager-config 