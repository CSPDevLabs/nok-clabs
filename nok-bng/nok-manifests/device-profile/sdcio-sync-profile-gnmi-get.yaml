apiVersion: inv.sdcio.dev/v1alpha1
kind: TargetSyncProfile
metadata:
  name: gnmi-get
  namespace: nok-bng
spec:
  buffer: 0
  workers: 10
  validate: true
  sync:
  - name: config
    protocol: gnmi
    port: 57400
    paths:
    - /configure
    mode: get
    encoding: JSON_IETF
    interval: 10s  